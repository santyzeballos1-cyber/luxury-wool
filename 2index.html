<!DOCTYPE html>
<html lang="es">

<head>

    <!-- Configuración básica -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <meta name="description" content="Luxury Wool - Marca masculina de ropa premium minimalista.">
    <meta name="keywords" content="Luxury Wool, ropa premium, moda masculina, streetwear, minimalismo">
    <meta name="author" content="Luxury Wool">

    <!-- Título -->
    <title>Luxury Wool | Premium Clothing</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/favicon.png">

    <!-- Estilos -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- ======================================================
         HEADER
    ======================================================= -->

    <header class="site-header">

        <!-- Botón menú -->

        <button class="menu-button" aria-label="Abrir menú">

            ☰

        </button>

        <!-- Logo -->

        <h1 class="brand-name">

            LUXURY WOOL

        </h1>

        <!-- Acciones -->

        <div class="header-actions">

            <div class="search-box">

                <input
                    type="search"
                    placeholder="BUSCAR"
                    aria-label="Buscar">

            </div>

            <button class="header-button">

                CARRITO

            </button>

            <button class="header-button">

                INICIO SESIÓN

            </button>

        </div>

    </header>

    <!-- ======================================================
         MENÚ LATERAL
    ======================================================= -->

    <aside class="side-menu">

        <button class="close-menu" aria-label="Cerrar menú">

            ×

        </button>

        <nav class="side-navigation">

            <a href="#">INICIO</a>

            <a href="#">COLECCIÓN</a>

            <a href="#">REMERAS</a>

            <a href="#">BUZOS</a>

            <a href="#">NOSOTROS</a>

            <a href="#">CONTACTO</a>

        </nav>

    </aside>

    <!-- Fondo oscuro -->

    <div class="menu-overlay"></div>

    <!-- ======================================================
         CONTENIDO PRINCIPAL
    ======================================================= -->

    <main class="site-main">

        <!-- HERO -->

        <section class="hero">

            <!-- Imagen principal -->

            <div class="hero-image">

                <img
                    id="slider-image"
                    src="images/REMERA LUXURY.jpeg"
                    alt="Luxury Wool colección masculina">

            </div>

            <!-- Contenido -->

            <div class="hero-content">

                <button class="collection-button">

                    NUESTRA COLECCIÓN

                </button>

                <p>

                    ESSENTIAL COLLECTION

                </p>

            </div>

            <!-- Slider -->

            <button class="slider-arrow arrow-left" aria-label="Imagen anterior">

                ←

            </button>

            <button class="slider-arrow arrow-right" aria-label="Imagen siguiente">

                →

            </button>

        </section>

    </main>

    <!-- ======================================================
         JAVASCRIPT
    ======================================================= -->

    <script src="js/script.js"></script>

</body>

</html>
